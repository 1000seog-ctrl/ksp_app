<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>(주)경성제약 실행기</title>
    <style>
        body { 
            margin: 0; padding: 0; background-color: #ADDF31; 
            font-family: 'Malgun Gothic', sans-serif; 
            display: flex; flex-direction: column; 
            justify-content: center; align-items: center; 
            min-height: 100vh; 
            -webkit-user-select: none; user-select: none; 
        }
        .main-container { width: 85%; max-width: 320px; display: flex; flex-direction: column; align-items: center; }

        /* [수정] 로고 크기 120% 확대 (기존 50px -> 60px) */
        .title-area { 
            display: flex; flex-direction: row; align-items: center; justify-content: center; 
            margin-bottom: 18px; width: 100%; cursor: pointer; 
        }
        .title-icon { width: 60px !important; height: 60px !important; margin-right: 12px; object-fit: contain; } 
        .top-title { color: #000000; font-size: 32px; font-weight: bold; margin: 0; letter-spacing: -1.5px; white-space: nowrap; }

        .date-time-display { width: 100%; font-size: 22px; font-weight: bold; color: #ff0000; margin: 0 0 12px 0; text-align: center; }
        .button-wrapper { width: 100%; margin-bottom: 12px; }
        .action-button { 
            width: 100%; height: 65px; background-color: #00A2E8; color: #000000; 
            font-size: 22px; font-weight: bold; border: 2px solid #000; border-radius: 12px; 
            box-shadow: 3px 3px 0px rgba(0,0,0,1); cursor: pointer; transition: all 0.1s; 
        }
        .action-button:active { transform: translate(2px, 2px); box-shadow: none; }
        .footer-area { width: 100%; display: flex; justify-content: flex-end; margin-top: 5px; }
        .footer-text { font-weight: bold; font-size: 18px; color: #333; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="title-area" onclick="askCredentials()">
        <img src="data:image/png;base64,..." class="title-icon" alt="로고">
        <h1 class="top-title">(주)경성제약</h1>
    </div>

    <div id="current-date-time" class="date-time-display"></div>

    <div class="button-wrapper"><button class="action-button" onclick="location.href='https://www.kyungsung365.com/common/member_login.asp'">홈페이지 로그인</button></div>
    <div class="button-wrapper"><button class="action-button" onclick="silentLogoutAndSignup()">경성제약 회원가입</button></div>
    <div class="button-wrapper"><button class="action-button" onclick="window.open('https://www.kyungsung365.com/shop/')">쇼핑몰 / 주문</button></div>
    <div class="button-wrapper"><button class="action-button" onclick="goLink('https://www.kyungsung365.com/myoffice/member/memberVote.asp')">추천 회원정보</button></div>
    <div class="button-wrapper"><button class="action-button" onclick="window.open('https://youtu.be/hdLtZwNcQJs')">경성제약 유튜브</button></div>
    <div class="button-wrapper"><button class="action-button" onclick="window.open('https://blog.naver.com/100seog/224178002933')">경성제약 장영실상</button></div>
    <div class="button-wrapper"><button class="action-button" onclick="window.open('https://search.naver.com/search.naver?where=news&query=%EC%9E%A5+%EA%B1%B4%EA%B0%95+%EC%9C%A0%EC%82%B0%EA%B7%A0+%ED%9A%A8%EB%8A%A5')">장 건강 전문 뉴스</button></div>

    <div class="footer-area">
        <span class="footer-text">행복해요... ^.~</span>
    </div>
</div>

<script>
    function updateTime() {
        const now = new Date();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const date = String(now.getDate()).padStart(2, '0');
        const days = ['일','월','화','수','목','금','토'];
        const h = String(now.getHours()).padStart(2, '0');
        const m = String(now.getMinutes()).padStart(2, '0');
        const s = String(now.getSeconds()).padStart(2, '0');
        document.getElementById('current-date-time').textContent = `${month}월 ${date}일(${days[now.getDay()]}) ${h}:${m}:${s}`;
    }
    setInterval(updateTime, 1000); updateTime();

    /* [수정] 로고 클릭 시 ID 저장 기능 */
    function askCredentials() {
        const id = prompt("저장할 아이디를 입력하세요:");
        if (id) {
            localStorage.setItem('ksj_id', id);
            alert("아이디가 저장되었습니다.");
        }
    }

    async function goLink(url) {
        const id = localStorage.getItem('ksj_id');
        if (id) { try { await navigator.clipboard.writeText(id); } catch (e) {} }
        location.href = url;
    }

    function silentLogoutAndSignup() {
        const logoutUrl = "https://www.kyungsung365.com/common/member_logout.asp";
        const signupUrl = "https://www.kyungsung365.com/common/joinStep01.asp";
        let iframe = document.createElement('iframe');
        iframe.style.display = "none";
        document.body.appendChild(iframe);
        iframe.src = logoutUrl;
        setTimeout(() => { window.location.href = signupUrl; }, 100);
    }
</script>
</body>
</html>
