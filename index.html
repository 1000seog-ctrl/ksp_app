<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
    <title>경성제약 유니버설 런처</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .grid-container { display: grid; grid-template-columns: repeat(2, 140px); grid-gap: 20px; }
        .grid-item { background-color: #ffffff; border: 2px solid #ddd; border-radius: 15px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-decoration: none; color: #333; font-weight: bold; transition: all 0.3s ease; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .grid-item:active { transform: scale(0.95); background-color: #e0e0e0; }
        .grid-item img { width: 50px; height: 50px; margin-bottom: 10px; }
        .grid-item span { font-size: 14px; text-align: center; }
        /* 높이 고정 */
        .grid-item { height: 140px; }
    </style>
</head>
<body>

<div class="grid-container">
    <!-- 1. 홈페이지 로그인 (모바일 버전) -->
    <a href="https://www.kyungsung365.com/m/common/member_login.asp" class="grid-item">
        <img src="https://img.icons8.com/color/96/home.png" alt="홈페이지">
        <span>홈페이지<br>로그인</span>
    </a>

    <!-- 2. 회원가입 (앱에서 가로채기 위해 로그아웃 주소 사용) -->
    <a href="https://www.kyungsung365.com/m/common/member_logout.asp" class="grid-item">
        <img src="https://img.icons8.com/color/96/add-user-group-man-man.png" alt="회원가입">
        <span>회원가입</span>
    </a>

    <!-- 3. 추천 회원정보 (대표님 요청: PC 버전 유지) -->
    <a href="https://www.kyungsung365.com/orgm/T_Tree_vt_V10.asp" class="grid-item">
        <img src="https://img.icons8.com/color/96/genealogy.png" alt="추천회원">
        <span>추천<br>회원정보</span>
    </a>

    <!-- 4. 쇼핑몰 (모바일 버전) -->
    <a href="https://www.kyungsung365.com/m/shop/category.asp" class="grid-item">
        <img src="https://img.icons8.com/color/96/shopping-cart.png" alt="쇼핑몰">
        <span>쇼핑몰</span>
    </a>

    <!-- 5. 마이페이지 (모바일 버전) -->
    <a href="https://www.kyungsung365.com/m/mypage/order_list.asp" class="grid-item">
        <img src="https://img.icons8.com/color/96/checked-user-male.png" alt="마이페이지">
        <span>마이페이지</span>
    </a>

    <!-- 6. 고객센터 (모바일 버전) -->
    <a href="https://www.kyungsung365.com/m/customer/notice_list.asp" class="grid-item">
        <img src="https://img.icons8.com/color/96/customer-support.png" alt="고객센터">
        <span>고객센터</span>
    </a>
</div>

</body>
</html>
