<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>(주)경성제약 실행기</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f4f4; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; justify-content: space-around; align-items: center; }
        .header { text-align: center; padding: 20px 0; }
        .logo { font-size: 28px; font-weight: bold; color: #2c3e50; margin-bottom: 5px; }
        .news-btn { background-color: #ffffff; color: #e74c3c; border: 2px solid #e74c3c; padding: 8px 15px; border-radius: 20px; font-weight: bold; font-size: 14px; margin-top: 10px; display: inline-block; text-decoration: none; }
        .button-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 90%; max-width: 400px; }
        .menu-btn { background-color: #2c3e50; color: white; padding: 25px 10px; border-radius: 12px; text-align: center; text-decoration: none; font-size: 18px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .footer { text-align: center; color: #7f8c8d; font-size: 14px; padding-bottom: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">(주)경성제약</div>
        <a href="https://www.ks-pharm.co.kr/news/news01.asp" class="news-btn">📰 장 건강 전문 뉴스 바로가기</a>
    </div>

    <div class="button-container">
        <a href="https://www.ks-pharm.co.kr/member/member_login.asp" class="menu-btn">홈페이지<br>로그인</a>
        <a href="#" onclick="forceLogout();" class="menu-btn" style="background-color: #e67e22;">회원가입<br>(로그아웃 후)</a>
        <a href="https://www.ks-pharm.co.kr/shop/shop_list01.asp" class="menu-btn">제품소개<br>구매하기</a>
        <a href="https://www.ks-pharm.co.kr/customer/customer01.asp" class="menu-btn">고객센터<br>문의하기</a>
    </div>

    <div class="footer">언제나 당신의 장 건강을 생각합니다. ^.~</div>

    <script>
        function forceLogout() {
            if(confirm("확실한 회원가입을 위해 기존 로그인을 해제합니다.")) {
                // 로그아웃 페이지를 아주 잠깐 들렀다가 회원가입으로 날려버립니다.
                location.href = "https://www.ks-pharm.co.kr/member/member_logout.asp";
                setTimeout(function() {
                    location.href = "https://www.ks-pharm.co.kr/member/member_join01.asp";
                }, 800);
            }
        }
    </script>
</body>
</html>
